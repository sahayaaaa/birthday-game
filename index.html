<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Thrii ❤️</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                to bottom,
                #0f172a,
                #172554,
                #1e293b
            );

            color: white;
            font-family: Arial, sans-serif;
        }

        .screen {
            display: none;
            text-align: center;
            max-width: 700px;
            width: 90%;
        }

        .active {
            display: block;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 35px;
            border-radius: 25px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        h1 {
            font-size: 3rem;
        }

        h2 {
            font-size: 2rem;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        button {
            margin-top: 20px;
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            background: #f8c8dc;
        }
    </style>
</head>

<body>

    <!-- LEVEL 1 -->
    <div id="home" class="screen active">
        <div class="card">

            <h1>🎂 Happy 19th Birthday ❤️</h1>

            <p>
                Welcome to a little corner of the internet
                made just for you, Thrii.
            </p>

            <p>
                I made something special for you.
            </p>

            <button onclick="goToReasons()">
                Start Adventure ❤️
            </button>

        </div>
    </div>

    <!-- LEVEL 2 -->
<div id="envelope" class="screen">

    <div class="card">

        <h1>💌</h1>

        <h2>A Letter For You</h2>

        <p>
            Open the envelope to see
            19 reasons why I like you.
        </p>

        <button onclick="openEnvelope()">
            Open Envelope ❤️
        </button>

    </div>

</div>
<!-- LEVEL 3 -->
<div id="reasons" class="screen">

    <div class="card">

        <h2 id="reason-title">
            19 Reasons Why I Like You ❤️
        </h2>

        <p id="reason-text">
            Click below to begin.
        </p>

        <button onclick="nextReason()">
            Next Reason ❤️
        </button>

    </div>

</div>
<script>

function hideAllScreens() {

    document.querySelectorAll(".screen")
        .forEach(screen => {
            screen.classList.remove("active");
        });
}

function goToEnvelope() {

    hideAllScreens();

    document
        .getElementById("envelope")
        .classList.add("active");
}

function openEnvelope() {

    hideAllScreens();

    document
        .getElementById("reasons")
        .classList.add("active");
}

let reasonIndex = -1;

const reasons = [

"You're cute in a way that always makes me smile.",

"You're one of the kindest people I've ever met.",

"You never leave people on seen because you genuinely care.",

"I love how much you love and respect your mom.",

"The way you talk is adorable.",

"Your voice can instantly make my day better.",

"I melt every time you sing.",

"I feel comfortable with you.",

"You make me feel loved even through a screen.",

"You're always there when I need you.",

"I love your silly tone when you talk.",

"Your meme references never fail to make me laugh.",

"You always know how to comfort me.",

"You're patient with me.",

"You never judge me.",

"You have such a gentle heart.",

"Being with you feels safe.",

"You're the biggest green flag I've ever met.",

"Out of all the reasons, my favorite one is simply that you're my cutieee ❤️"

];

function nextReason() {

    reasonIndex++;

    if (reasonIndex < reasons.length) {

        document.getElementById("reason-title").innerText =
            "💌 Reason " + (reasonIndex + 1) + " of 19";

        document.getElementById("reason-text").innerText =
            reasons[reasonIndex];
    }
}

</script>

</body>
</html>
